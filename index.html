<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fall 2026 Course Planner</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; height: 100vh; overflow: hidden; background: #f0f2f5; color: #1a1a1a; font-size: 13px; }

/* ── Sidebar ── */
#sidebar {
  width: 340px; min-width: 280px; display: flex; flex-direction: column;
  background: #fff; border-right: 1px solid #e0e0e0; z-index: 10;
}
#sidebar-header { padding: 14px 16px 10px; border-bottom: 1px solid #e0e0e0; }
#sidebar-header h1 { font-size: 15px; font-weight: 700; color: #111; margin-bottom: 10px; }
#search { width: 100%; padding: 7px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; outline: none; }
#search:focus { border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37,99,235,.12); }
.tabs { display: flex; gap: 6px; margin-top: 10px; }
.tab { flex: 1; padding: 5px 8px; border: 1px solid #ddd; background: #f5f5f5; border-radius: 5px; cursor: pointer; font-size: 12px; text-align: center; transition: all .15s; }
.tab.active { background: #2563eb; border-color: #2563eb; color: #fff; font-weight: 600; }
.tab:hover:not(.active) { background: #eee; }

#course-list { flex: 1; overflow-y: auto; padding: 8px 8px; }

.card {
  background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 10px 11px;
  margin-bottom: 7px; transition: box-shadow .15s, opacity .15s;
  border-left: 3px solid #ddd;
}
.card:hover { box-shadow: 0 1px 6px rgba(0,0,0,.1); }
.card.added { border-left-color: var(--course-color, #2563eb); background: var(--course-bg, #eff6ff); }
.card.discarded { opacity: .45; border-left-color: #bbb; }
.card.no-schedule { border-left-style: dashed; }
.card.conflict-highlight { outline: 2px solid #ef4444; outline-offset: 1px; }

.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 6px; margin-bottom: 4px; }
.course-id { font-weight: 700; font-size: 12px; color: #2563eb; white-space: nowrap; }
.card.discarded .course-id { color: #888; }
.course-name { font-weight: 600; font-size: 12.5px; flex: 1; line-height: 1.3; }
.course-meta { color: #666; font-size: 11.5px; margin-top: 3px; display: flex; flex-wrap: wrap; gap: 4px 10px; }
.meta-item { white-space: nowrap; }
.meta-item.time { font-weight: 500; color: #444; }
.badges { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
.badge { font-size: 10px; padding: 1px 5px; border-radius: 3px; background: #f0f0f0; color: #555; }
.badge.exp { background: #dcfce7; color: #166534; }
.badge.biz { background: #dbeafe; color: #1e3a8a; }
.badge.new { background: #fef9c3; color: #713f12; }
.badge.online { background: #f3e8ff; color: #6b21a8; }

.card-actions { display: flex; gap: 5px; margin-top: 8px; }
.btn { padding: 4px 10px; border-radius: 5px; border: 1px solid; cursor: pointer; font-size: 11.5px; font-weight: 500; transition: all .15s; white-space: nowrap; }
.btn-add { background: #fff; border-color: #2563eb; color: #2563eb; }
.btn-add:hover { background: #eff6ff; }
.btn-remove { background: #fff; border-color: #dc2626; color: #dc2626; }
.btn-remove:hover { background: #fef2f2; }
.btn-discard { background: #fff; border-color: #999; color: #666; }
.btn-discard:hover { background: #f5f5f5; }
.btn-restore { background: #fff; border-color: #059669; color: #059669; }
.btn-restore:hover { background: #ecfdf5; }
.btn-link { background: #fff; border-color: #d1d5db; color: #374151; }
.btn-link:hover { background: #f9fafb; }

#sidebar-footer { padding: 10px 16px; border-top: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; }
#unit-summary { font-size: 13px; color: #888; font-weight: 400; }
#unit-count { font-weight: 700; color: #2563eb; }
#conflict-warn { font-size: 11px; color: #dc2626; font-weight: 600; display: none; }

/* ── Grid ── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#grid-header { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 10px 0 0; }
#grid-title { padding: 0 16px 8px; font-size: 14px; font-weight: 700; }

#grid-wrap { flex: 1; overflow: auto; }
#grid { display: grid; grid-template-columns: 52px repeat(7, 1fr); position: relative; }

.day-header { text-align: center; padding: 6px 4px; font-size: 12px; font-weight: 600; color: #444; background: #fff; border-bottom: 1px solid #e0e0e0; position: sticky; top: 0; z-index: 5; }
.day-header.weekend { color: #888; background: #fafafa; }
.time-col-header { background: #fff; border-bottom: 1px solid #e0e0e0; position: sticky; top: 0; z-index: 5; }

.day-col { position: relative; border-left: 1px solid #ebebeb; }
.day-col.weekend { background: #fafafa; }
.time-col { }

.hour-row { height: 60px; border-bottom: 1px solid #f0f0f0; position: relative; }
.hour-label { position: absolute; top: -8px; right: 6px; font-size: 10px; color: #aaa; white-space: nowrap; }
.half-line { position: absolute; top: 30px; left: 0; right: 0; border-top: 1px dashed #f0f0f0; }

.grid-col-inner { position: relative; }
.course-block {
  position: absolute; left: 2px; right: 2px;
  border-radius: 5px; padding: 3px 5px;
  font-size: 10.5px; line-height: 1.3; overflow: hidden;
  border: 1px solid rgba(0,0,0,.1);
  cursor: pointer; transition: filter .15s;
}
.course-block:hover { filter: brightness(.92); }
.course-block .block-id { font-weight: 700; font-size: 10px; }
.course-block .block-name { font-size: 10px; opacity: .9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.course-block .block-time { font-size: 9.5px; opacity: .75; }
.course-block.conflict { outline: 2px solid #ef4444; }
.conflict-badge { position: absolute; top: 2px; right: 2px; font-size: 9px; background: #ef4444; color: #fff; border-radius: 3px; padding: 0 3px; }

.no-sched-section { margin-top: 4px; padding: 8px 12px; background: #fafafa; border-top: 1px solid #eee; }
.no-sched-label { font-size: 11px; color: #999; margin-bottom: 6px; font-style: italic; }
</style>
</head>
<body>

<aside id="sidebar">
  <div id="sidebar-header">
    <h1>Fall 2026 FTMBA Electives</h1>
    <input id="search" type="search" placeholder="Search course, name, instructor…">
    <div class="tabs">

</main>

const DAY_MAP = {
  'M':[0],'T':[1],'W':[2],'Th':[3],'F':[4],'S':[5],'Su':[6],
  'TTh':[1,3],'MW':[0,2],'MTWThF':[0,1,2,3,4],

};

// ── State ──
let states = {}; // course_num → 'neutral'|'added'|'discarded'
let colorMap = {}; // course_num → palette index
let colorCounter = 0;
let currentTab = 'all';
let searchQuery = '';

function loadState() {
  try { states = JSON.parse(localStorage.getItem('cs_states') || '{}'); } catch(e) { states = {}; }
  try { colorMap = JSON.parse(localStorage.getItem('cs_colors') || '{}'); } catch(e) { colorMap = {}; }
  colorCounter = Object.keys(colorMap).length;
}
function saveState() {
  localStorage.setItem('cs_states', JSON.stringify(states));
  localStorage.setItem('cs_colors', JSON.stringify(colorMap));
}
function getState(id) { return states[id] || 'neutral'; }
function setState(id, s) {
  states[id] = s;
  if (s === 'added' && colorMap[id] === undefined) {
    colorMap[id] = colorCounter % PALETTE.length;
    colorCounter++;
  }
  saveState();
}
function getColor(id) {
  const idx = colorMap[id] !== undefined ? colorMap[id] : 0;
  return PALETTE[idx];
}

// ── Data processing ──
const COURSES = RAW_COURSES.filter(c => c.course_num && String(c.course_num).length < 30);

function parseTime(t) {
  if (!t) return null;
  const m = t.match(/(\d+)(?::(\d+))?\s*(AM|PM)\s*-\s*(\d+)(?::(\d+))?\s*(AM|PM)/i);
  if (!m) return null;
  let sh=+m[1], sm=+(m[2]||0), sa=m[3].toUpperCase();
  let eh=+m[4], em=+(m[5]||0), ea=m[6].toUpperCase();
  let start = sh + sm/60;
  let end   = eh + em/60;
  if (sa==='PM' && sh!==12) start += 12;
  if (ea==='PM' && eh!==12) end += 12;
  if (sa==='AM' && sh===12) start = 0;
  if (ea==='AM' && eh===12) end = 0;
  return {start, end};
}

function parseDays(d) {
  if (!d || String(d).length > 20) return [];
  return DAY_MAP[d] || [];
}

// Returns [{day, time}] for every time slot the course meets
function getCourseSlots(c) {
  if (c.slots) return c.slots;
  if (c.day && c.time) return [{day: c.day, time: c.time}];
  return [];
}
function isScheduled(c) { return getCourseSlots(c).length > 0; }

// ── Conflict detection ──
function findConflicts() {
  const added = COURSES.filter(c => getState(c.course_num) === 'added');
  const conflicts = new Set();
  for (let i = 0; i < added.length; i++) {
    for (let j = i+1; j < added.length; j++) {
      const a = added[i], b = added[j];
      for (const sa of getCourseSlots(a)) {
        for (const sb of getCourseSlots(b)) {
          const da = parseDays(sa.day), db = parseDays(sb.day);
          const ta = parseTime(sa.time), tb = parseTime(sb.time);
          if (!ta || !tb) continue;
          if (da.some(d => db.includes(d)) && ta.start < tb.end && tb.start < ta.end) {
            conflicts.add(a.course_num);
            conflicts.add(b.course_num);
          }
        }
      }
    }
  }
  return conflicts;
}

// ── Grid layout: side-by-side overlap ──
function computeColumns(events) {
  // events: [{id, start, end}], returns {id: {col, totalCols}}
  const sorted = [...events].sort((a,b) => a.start - b.start || a.end - b.end);
  const result = {};
  const groups = [];
  let curGroup = [], maxEnd = -Infinity;
  for (const ev of sorted) {
    if (curGroup.length && ev.start >= maxEnd) {
      groups.push([...curGroup]); curGroup = []; maxEnd = -Infinity;
    }
    curGroup.push(ev);
    maxEnd = Math.max(maxEnd, ev.end);
  }
  if (curGroup.length) groups.push(curGroup);
  for (const grp of groups) {
    grp.forEach((ev, i) => { result[ev.id] = {col: i, totalCols: grp.length}; });
  }
  return result;
}

// ── Render sidebar ──
function renderSidebar() {
  const q = searchQuery.toLowerCase();
  const conflicts = findConflicts();

  const scheduled = COURSES.filter(c => isScheduled(c));
  const unscheduled = COURSES.filter(c => !isScheduled(c));

  function matchesSearch(c) {
    return !q || c.course_num.toLowerCase().includes(q)
      || c.name.toLowerCase().includes(q)
      || (c.instructors||'').toLowerCase().includes(q);
  }
  function matchesTab(c) {
    const s = getState(c.course_num);
    if (currentTab === 'active') return s !== 'discarded';
    if (currentTab === 'discarded') return s === 'discarded';
    return true;
  }

  const listEl = document.getElementById('course-list');
  listEl.innerHTML = '';

  // Scheduled courses
  const visibleSched = scheduled.filter(c => matchesSearch(c) && matchesTab(c));
  visibleSched.forEach(c => listEl.appendChild(makeCard(c, conflicts)));

  // Unscheduled section
  const visibleUnsched = unscheduled.filter(c => matchesSearch(c) && matchesTab(c));
  if (visibleUnsched.length > 0) {
    const sec = document.createElement('div');
    sec.className = 'no-sched-section';
    sec.innerHTML = `<div class="no-sched-label">No fixed schedule (campus courses)</div>`;
    visibleUnsched.forEach(c => sec.appendChild(makeCard(c, conflicts)));
    listEl.appendChild(sec);
  }

  // Unit count
  const addedUnits = COURSES
    .filter(c => getState(c.course_num) === 'added')
    .reduce((sum, c) => sum + (c.units || 0), 0);
  document.getElementById('unit-count').textContent = addedUnits;

  // Conflict warning
  const warnEl = document.getElementById('conflict-warn');
  warnEl.style.display = conflicts.size > 0 ? 'inline' : 'none';
  warnEl.textContent = conflicts.size > 0 ? `⚠ ${conflicts.size/2|0} conflict${conflicts.size>2?'s':''}` : '';
}

function makeCard(c, conflicts) {
  const s = getState(c.course_num);
  const color = getColor(c.course_num);
  const hasConflict = conflicts.has(c.course_num);
  const scheduled = isScheduled(c);

  const div = document.createElement('div');
  div.className = `card${s==='added'?' added':''}${s==='discarded'?' discarded':''}${!scheduled?' no-schedule':''}${hasConflict?' conflict-highlight':''}`;
  if (s === 'added') {
    div.style.setProperty('--course-color', color.border);
    div.style.setProperty('--course-bg', color.bg);
  }

  const slots = getCourseSlots(c);
  const timeStr = slots.map(s => `${s.day} · ${s.time}`).join('  /  ');
  const certBadge = c.certificate && c.certificate !== 'N/A'
    ? `<span class="badge">${c.certificate}</span>` : '';
  const expBadge = c.experiential === 'Y' ? `<span class="badge exp">Experiential</span>` : '';
  const bizBadge = c.biz_tech === 'Y' ? `<span class="badge biz">Biz+Tech</span>` : '';
  const newBadge = (c.notes||'').toLowerCase().includes('new course') ? `<span class="badge new">New</span>` : '';
  const onlineBadge = (c.notes||'').toLowerCase().includes('online') ? `<span class="badge online">Online</span>` : '';

  const addBtn = s === 'neutral'
    ? `<button class="btn btn-add" onclick="setS('${c.course_num}','added')">+ Add</button>
       <button class="btn btn-discard" onclick="setS('${c.course_num}','discarded')">Discard</button>`
    : s === 'added'
    ? `<button class="btn btn-remove" onclick="setS('${c.course_num}','neutral')">Remove</button>`
    : `<button class="btn btn-restore" onclick="setS('${c.course_num}','neutral')">Restore</button>`;

  const linkBtn = c.link
    ? `<button class="btn btn-link" onclick="window.open('${c.link}','_blank')">↗ Details</button>`
    : '';

  div.innerHTML = `
    <div class="card-top">
      <span class="course-id">${c.course_num}</span>
      <span class="course-name">${c.name}</span>
    </div>
    <div class="course-meta">
      ${c.instructors ? `<span class="meta-item">${c.instructors}</span>` : ''}
      ${timeStr ? `<span class="meta-item time">${timeStr}</span>` : ''}
      ${c.dates ? `<span class="meta-item">${c.dates}</span>` : ''}
      ${c.units ? `<span class="meta-item">${c.units} cr</span>` : ''}
    </div>
    ${(certBadge||expBadge||bizBadge||newBadge||onlineBadge) ? `<div class="badges">${certBadge}${expBadge}${bizBadge}${newBadge}${onlineBadge}</div>` : ''}
    <div class="card-actions">${addBtn}${linkBtn}</div>
  `;
  return div;
}

// ── Render grid ──
function renderGrid() {
  const gridEl = document.getElementById('grid');
  gridEl.innerHTML = '';
  const totalHours = GRID_END - GRID_START;
  const gridHeight = totalHours * PX_PER_HR;

  // Header row: time col + 7 day cols
  const timeHdr = document.createElement('div');
  timeHdr.className = 'time-col-header';
  gridEl.appendChild(timeHdr);

  DAYS.forEach((d, i) => {
    const hdr = document.createElement('div');
    hdr.className = `day-header${i>=5?' weekend':''}`;
    hdr.textContent = d;
    gridEl.appendChild(hdr);
  });

  // Build per-day course lists for overlap computation
  const added = COURSES.filter(c => getState(c.course_num) === 'added');
  const conflicts = findConflicts();

  const dayEvents = Array.from({length:7}, () => []);
  for (const c of added) {
    for (const slot of getCourseSlots(c)) {
      const days = parseDays(slot.day);
      const t = parseTime(slot.time);
      if (!t) continue;
      for (const d of days) {
        dayEvents[d].push({id: c.course_num, start: t.start, end: t.end});
      }
    }
  }
  const dayLayouts = dayEvents.map(evs => computeColumns(evs));

  // Time column
  const timeCol = document.createElement('div');
  timeCol.className = 'time-col';
  timeCol.style.height = `${gridHeight}px`;
  timeCol.style.position = 'relative';
  for (let h = GRID_START; h < GRID_END; h++) {
    const row = document.createElement('div');
    row.className = 'hour-row';
    const label = document.createElement('div');
    label.className = 'hour-label';
    label.textContent = h < 12 ? `${h}am` : h === 12 ? '12pm' : `${h-12}pm`;
    const half = document.createElement('div');
    half.className = 'half-line';
    row.appendChild(label);
    row.appendChild(half);
    timeCol.appendChild(row);
  }
  gridEl.appendChild(timeCol);

  // Day columns
  DAYS.forEach((_, dayIdx) => {
    const col = document.createElement('div');
    col.className = `day-col${dayIdx>=5?' weekend':''}`;
    col.style.height = `${gridHeight}px`;
    col.style.position = 'relative';

    // Grid lines
    for (let h = 0; h < totalHours; h++) {
      const row = document.createElement('div');
      row.className = 'hour-row';
      const half = document.createElement('div');
      half.className = 'half-line';
      row.appendChild(half);
      col.appendChild(row);
    }

    // Course blocks — one block per slot that falls on this day
    const layout = dayLayouts[dayIdx];

    for (const c of added) {
      const color = getColor(c.course_num);
      const hasConflict = conflicts.has(c.course_num);
      for (const slot of getCourseSlots(c)) {
        if (!parseDays(slot.day).includes(dayIdx)) continue;
        const t = parseTime(slot.time);
        if (!t) continue;
        const lout = layout[c.course_num] || {col:0, totalCols:1};
        const top = (t.start - GRID_START) * PX_PER_HR;
        const height = Math.max((t.end - t.start) * PX_PER_HR, 20);
        const widthPct = 100 / lout.totalCols;
        const leftPct = lout.col * widthPct;

        const block = document.createElement('div');
        block.className = `course-block${hasConflict?' conflict':''}`;
        block.style.cssText = `
          top:${top}px; height:${height}px;
          left:calc(${leftPct}% + 2px); width:calc(${widthPct}% - 4px);
          background:${color.bg}; border-color:${color.border}; color:${color.text};
        `;
        const allSlots = getCourseSlots(c).map(s=>`${s.day} ${s.time}`).join(', ');
        block.innerHTML = `
          <div class="block-id">${c.course_num}</div>
          <div class="block-name">${c.name}</div>
          <div class="block-time">${slot.time}</div>
          ${hasConflict ? '<div class="conflict-badge">⚠</div>' : ''}
        `;
        block.title = `${c.course_num} – ${c.name}\n${c.instructors||''}\n${allSlots}\n${c.dates||''}`;
        block.addEventListener('click', () => {
          document.getElementById('search').value = c.course_num;
          searchQuery = c.course_num.toLowerCase();
          renderAll();
        });
        col.appendChild(block);
      }
    }

    gridEl.appendChild(col);
  });

  // Update grid template rows
  gridEl.style.gridTemplateRows = `32px ${gridHeight}px`;
}

function renderAll() {
  renderSidebar();
  renderGrid();
}

// ── Global action ──
window.setS = function(id, s) {
  setState(id, s);
  renderAll();
};

// ── Tab & search wiring ──
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    currentTab = t.dataset.tab;
    renderAll();
  });
});

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase();
  renderAll();
});

// ── Boot ──
loadState();
renderAll();
</script>
</body>
</html>
